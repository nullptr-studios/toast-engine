          cmake -B build/linux-test-debug -DCMAKE_BUILD_TYPE=Debug -DCMAKE_TOOLCHAIN_FILE="${{ steps.vcpkg.outputs.toolchain-file }}"
          cmake --build build/linux-test-debug
          ctest --test-dir build/linux-test-debug --verbose

  test-linux-release:
