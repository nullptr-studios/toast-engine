name: ci-build-linux

on:
  pull_request:
    branches:
      - dev
      - main
    types:
      - opened
      - reopened
      - synchronize
      - edited

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-build-linux-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build-linux-gcc:
    name: build linux ${{ matrix.compiler }} ${{ matrix.build_type }}
    runs-on: [self-hosted, linux]
    strategy:
      matrix:
        compiler: [gcc]
        c_compiler: [gcc]
        cxx_compiler: [g++]
        build_type: [debug, release]
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.head_ref }}
          fetch-depth: 1

      - name: Install Nix
        uses: cachix/install-nix-action@v31.10.6

      - name: Setup vcpkg
        id: vcpkg
        uses: ./.github/actions/setup-vcpkg

      - name: Build
        run: |
          eval "$(nix --extra-experimental-features 'nix-command flakes' print-dev-env .)"
          rustup toolchain install stable --no-self-update
          BASE_TYPE=${{ matrix.build_type }}
          BUILD_TYPE=$([ "$BASE_TYPE" == "debug" ] && echo "Debug" || echo "Release")
          cmake -B build/linux-${{ matrix.compiler }}-${{ matrix.build_type }} \
            -DCMAKE_BUILD_TYPE=$BUILD_TYPE \
            -DCMAKE_C_COMPILER=${{ matrix.c_compiler }} \
            -DCMAKE_CXX_COMPILER=${{ matrix.cxx_compiler }} \
            -DCMAKE_TOOLCHAIN_FILE="${{ steps.vcpkg.outputs.toolchain-file }}"
          cmake --build build/linux-${{ matrix.compiler }}-${{ matrix.build_type }} --parallel "$(nproc)"

  build-linux-clang:
    name: build linux clang ${{ matrix.build_type }}
    if: github.base_ref == 'main'
    runs-on: [self-hosted, linux]
    strategy:
      matrix:
        build_type: [debug, release]
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.head_ref }}
          fetch-depth: 1

      - name: Install Nix
        uses: cachix/install-nix-action@v31.10.6

      - name: Setup vcpkg
        id: vcpkg
        uses: ./.github/actions/setup-vcpkg

      - name: Build
        run: |
          eval "$(nix --extra-experimental-features 'nix-command flakes' print-dev-env .)"
          rustup toolchain install stable --no-self-update
          BASE_TYPE=${{ matrix.build_type }}
          BUILD_TYPE=$([ "$BASE_TYPE" == "debug" ] && echo "Debug" || echo "Release")
          cmake -B build/linux-clang-${{ matrix.build_type }} \
            -DCMAKE_BUILD_TYPE=$BUILD_TYPE \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_TOOLCHAIN_FILE="${{ steps.vcpkg.outputs.toolchain-file }}"
          cmake --build build/linux-clang-${{ matrix.build_type }} --parallel "$(nproc)"

  test-linux-debug:
    name: test linux debug
    needs: build-linux-gcc
    runs-on: [self-hosted, linux]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.head_ref }}
          fetch-depth: 1

      - name: Install Nix
        uses: cachix/install-nix-action@v31.10.6

      - name: Setup vcpkg
        id: vcpkg
        uses: ./.github/actions/setup-vcpkg

      - name: Run tests
        env:
          TRACY_NO_INVARIANT_CHECK: "1"
        run: |
          eval "$(nix --extra-experimental-features 'nix-command flakes' print-dev-env .)"
          rustup toolchain install stable --no-self-update
          cmake -B build/linux-test-debug \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_TOOLCHAIN_FILE="${{ steps.vcpkg.outputs.toolchain-file }}"
          cmake --build build/linux-test-debug --parallel "$(nproc)"
          ctest --test-dir build/linux-test-debug --verbose

  test-linux-release:
    name: test linux release
    needs: build-linux-gcc
    if: github.base_ref == 'main'
    runs-on: [self-hosted, linux]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.head_ref }}
          fetch-depth: 1

      - name: Install Nix
        uses: cachix/install-nix-action@v31.10.6

      - name: Setup vcpkg
        id: vcpkg
        uses: ./.github/actions/setup-vcpkg

      - name: Run tests
        env:
          TRACY_NO_INVARIANT_CHECK: "1"
        run: |
          eval "$(nix --extra-experimental-features 'nix-command flakes' print-dev-env .)"
          rustup toolchain install stable --no-self-update
          cmake -B build/linux-test-release \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE="${{ steps.vcpkg.outputs.toolchain-file }}"
          cmake --build build/linux-test-release --parallel "$(nproc)"
          ctest --test-dir build/linux-test-release --verbose

  build-tools-linux-debug:
    name: build ${{ matrix.tool }} linux debug
    needs: build-linux-gcc
    runs-on: [self-hosted, linux]
    strategy:
      matrix:
        tool: [editor, player, log_server, kenzo]
      fail-fast: false
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.head_ref }}
          fetch-depth: 1

      - name: Install Nix
        uses: cachix/install-nix-action@v31.10.6

      - name: Setup vcpkg
        id: vcpkg
        uses: ./.github/actions/setup-vcpkg

      - name: Build ${{ matrix.tool }}
        run: |
          eval "$(nix --extra-experimental-features 'nix-command flakes' print-dev-env .)"
          rustup toolchain install stable --no-self-update
          cmake -B build/linux-tools-debug \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_TOOLCHAIN_FILE="${{ steps.vcpkg.outputs.toolchain-file }}"
          cmake --build build/linux-tools-debug --parallel "$(nproc)" --target ${{ matrix.tool }}

  build-tools-linux-release:
    name: build ${{ matrix.tool }} linux release
    needs: build-linux-gcc
    if: github.base_ref == 'main'
    runs-on: [self-hosted, linux]
    strategy:
      matrix:
        tool: [editor, player, log_server, kenzo]
      fail-fast: false
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.head_ref }}
          fetch-depth: 1

      - name: Install Nix
        uses: cachix/install-nix-action@v31.10.6

      - name: Setup vcpkg
        id: vcpkg
        uses: ./.github/actions/setup-vcpkg

      - name: Build ${{ matrix.tool }}
        run: |
          eval "$(nix --extra-experimental-features 'nix-command flakes' print-dev-env .)"
          rustup toolchain install stable --no-self-update
          cmake -B build/linux-tools-release \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE="${{ steps.vcpkg.outputs.toolchain-file }}"
          cmake --build build/linux-tools-release --parallel "$(nproc)" --target ${{ matrix.tool }}
