name: ci-linux-dev

on:
  pull_request:
    branches:
      - dev
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: read

concurrency:
  group: ci-linux-dev-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and Test (GCC Debug)
    runs-on: [self-hosted, Linux, X64]
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.head_ref }}
          fetch-depth: 1

      - name: Install Nix
        uses: cachix/install-nix-action@v31.10.6

      - name: Build and test
        env:
          TRACY_NO_INVARIANT_CHECK: "1"
        run: nix develop --command bash -c "
          rustup toolchain install stable --no-self-update &&
          rustup default stable &&
          cmake -B build -G Ninja
            -DCMAKE_C_COMPILER=gcc
            -DCMAKE_CXX_COMPILER=g++
            -DCMAKE_BUILD_TYPE=Debug
            -DCMAKE_TOOLCHAIN_FILE=\$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake
            -DCMAKE_C_COMPILER_LAUNCHER=ccache
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache &&
          cmake --build build --parallel \$(nproc) --target toast_engine &&
          cmake --build build --parallel \$(nproc) --target toast_tests &&
          ctest --test-dir build --verbose &&
          cmake --build build --parallel \$(nproc) --target dummy_game
          "

  clang-tidy:
    name: clang-tidy
    runs-on: [self-hosted, Linux, X64]
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.head_ref }}
          fetch-depth: 1

      - name: Install Nix
        uses: cachix/install-nix-action@v31.10.6

      - name: Configure and run clang-tidy
        run: nix develop --command bash -c "
          rustup toolchain install stable --no-self-update &&
          rustup default stable &&
          cmake -B build -G Ninja
            -DCMAKE_C_COMPILER=gcc
            -DCMAKE_CXX_COMPILER=g++
            -DCMAKE_BUILD_TYPE=Debug
            -DCMAKE_TOOLCHAIN_FILE=\$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake
            -DCMAKE_C_COMPILER_LAUNCHER=ccache
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON &&
          bash ./tools/ci/clang_tidy.sh build
          "

  build-editor:
    name: Build editor (C#)
    runs-on: [self-hosted, Linux, X64]
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.head_ref }}
          fetch-depth: 1

      - name: Install Nix
        uses: cachix/install-nix-action@v31.10.6

      - name: Build editor (Debug)
        run: nix develop --command bash -c 'dotnet build editor/editor.csproj --configuration Debug'
