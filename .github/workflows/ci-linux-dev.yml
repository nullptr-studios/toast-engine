name: ci-linux-dev

on:
  pull_request:
    branches:
      - dev
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: read

concurrency:
  group: ci-linux-dev-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  cmake-configure:
    name: CMake Configure (GCC, Debug)
    runs-on: [self-hosted, Linux, X64]
    defaults:
      run:
        shell: nix develop --command bash -e {0}
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.head_ref }}
          fetch-depth: 1

      - name: Install Nix
        uses: cachix/install-nix-action@v31.10.6

      - name: CMake configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_C_COMPILER=gcc \
            -DCMAKE_CXX_COMPILER=g++ \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_TOOLCHAIN_FILE=$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Upload CMake cache
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cmake-cache
          path: build/
          retention-days: 1

  clang-tidy:
    name: clang-tidy
    runs-on: [self-hosted, Linux, X64]
    needs: cmake-configure
    defaults:
      run:
        shell: nix develop --command bash -e {0}
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.head_ref }}
          fetch-depth: 1

      - name: Install Nix
        uses: cachix/install-nix-action@v31.10.6

      - name: Download CMake cache
        uses: actions/download-artifact@v4
        with:
          name: cmake-cache
          path: build/

      - name: Copy compile_commands.json to root
        run: cp build/compile_commands.json .

      - name: Run clang-tidy
        run: bash ./tools/ci/clang_tidy.sh

  compile-engine:
    name: Compile toast_engine
    runs-on: [self-hosted, Linux, X64]
    needs: cmake-configure
    defaults:
      run:
        shell: nix develop --command bash -e {0}
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.head_ref }}
          fetch-depth: 1

      - name: Install Nix
        uses: cachix/install-nix-action@v31.10.6

      - name: Download CMake cache
        uses: actions/download-artifact@v4
        with:
          name: cmake-cache
          path: build/

      - name: Compile toast_engine
        run: cmake --build build --target toast_engine

      - name: Upload engine artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: engine-artifacts
          path: |
            build/
            out/
          retention-days: 1

  compile-tests:
    name: Compile and run toast_tests
    runs-on: [self-hosted, Linux, X64]
    needs: compile-engine
    defaults:
      run:
        shell: nix develop --command bash -e {0}
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.head_ref }}
          fetch-depth: 1

      - name: Install Nix
        uses: cachix/install-nix-action@v31.10.6

      - name: Download engine artifacts
        uses: actions/download-artifact@v4
        with:
          name: engine-artifacts
          path: ./

      - name: Compile toast_tests
        run: cmake --build build --target toast_tests

      - name: Run tests
        run: ctest --test-dir build --verbose

  compile-dummy-game:
    name: Compile dummy_game
    runs-on: [self-hosted, Linux, X64]
    needs: compile-engine
    defaults:
      run:
        shell: nix develop --command bash -e {0}
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.head_ref }}
          fetch-depth: 1

      - name: Install Nix
        uses: cachix/install-nix-action@v31.10.6

      - name: Download engine artifacts
        uses: actions/download-artifact@v4
        with:
          name: engine-artifacts
          path: ./

      - name: Compile dummy_game
        run: cmake --build build --target dummy_game

  build-editor:
    name: Build editor (C#)
    runs-on: [self-hosted, Linux, X64]
    defaults:
      run:
        shell: nix develop --command bash -e {0}
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.head_ref }}
          fetch-depth: 1

      - name: Install Nix
        uses: cachix/install-nix-action@v31.10.6

      - name: Build editor (Debug)
        run: dotnet build editor/editor.csproj --configuration Debug
