name: ci-linux-main

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: read

concurrency:
  group: ci-linux-main-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and Test (${{ matrix.compiler }}, ${{ matrix.build_type }})
    runs-on: [self-hosted, Linux, X64]
    strategy:
      matrix:
        include:
          - compiler: gcc
            c_compiler: gcc
            cxx_compiler: g++
            build_type: Debug
          - compiler: gcc
            c_compiler: gcc
            cxx_compiler: g++
            build_type: Release
          - compiler: clang
            c_compiler: clang
            cxx_compiler: clang++
            build_type: Debug
          - compiler: clang
            c_compiler: clang
            cxx_compiler: clang++
            build_type: Release
      fail-fast: false
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.head_ref }}
          fetch-depth: 1

      - name: Install Nix
        uses: cachix/install-nix-action@v31.10.6

      - name: Build and test
        run: nix develop --command bash -c "
          rustup toolchain install stable --no-self-update &&
          rustup default stable &&
          cmake -B build -G Ninja
            -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
            -DCMAKE_CXX_COMPILER=${{ matrix.cxx_compiler }}
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
            -DCMAKE_TOOLCHAIN_FILE=\$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake
            -DCMAKE_C_COMPILER_LAUNCHER=ccache
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache &&
          cmake --build build --parallel \$(nproc) --target toast_engine &&
          cmake --build build --parallel \$(nproc) --target toast_tests &&
          ctest --test-dir build --verbose &&
          cmake --build build --parallel \$(nproc) --target dummy_game
          "

  clang-tidy:
    name: clang-tidy (GCC Debug)
    runs-on: [self-hosted, Linux, X64]
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.head_ref }}
          fetch-depth: 1

      - name: Install Nix
        uses: cachix/install-nix-action@v31.10.6

      - name: Configure and run clang-tidy
        run: nix develop --command bash -c "
          rustup toolchain install stable --no-self-update &&
          rustup default stable &&
          cmake -B build -G Ninja
            -DCMAKE_C_COMPILER=gcc
            -DCMAKE_CXX_COMPILER=g++
            -DCMAKE_BUILD_TYPE=Debug
            -DCMAKE_TOOLCHAIN_FILE=\$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake
            -DCMAKE_C_COMPILER_LAUNCHER=ccache
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON &&
          bash ./tools/ci/clang_tidy.sh build
          "

  cargo-log-server:
    name: Cargo log_server (${{ matrix.build_type }})
    runs-on: [self-hosted, Linux, X64]
    strategy:
      matrix:
        build_type: [debug, release]
      fail-fast: false
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.head_ref }}
          fetch-depth: 1

      - name: Install Nix
        uses: cachix/install-nix-action@v31.10.6

      - name: Cargo build
        env:
          RELEASE_FLAG: ${{ matrix.build_type == 'release' && '--release' || '' }}
        run: nix develop --command bash -c "rustup toolchain install stable --no-self-update && rustup default stable && cargo build --manifest-path tools/log_server/Cargo.toml $RELEASE_FLAG"

  cargo-reflection-generator:
    name: Cargo reflection_generator (${{ matrix.build_type }})
    runs-on: [self-hosted, Linux, X64]
    strategy:
      matrix:
        build_type: [debug, release]
      fail-fast: false
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.head_ref }}
          fetch-depth: 1

      - name: Install Nix
        uses: cachix/install-nix-action@v31.10.6

      - name: Cargo build
        env:
          RELEASE_FLAG: ${{ matrix.build_type == 'release' && '--release' || '' }}
        run: nix develop --command bash -c "rustup toolchain install stable --no-self-update && rustup default stable && cargo build --manifest-path tools/reflection_generator/Cargo.toml $RELEASE_FLAG"

  cargo-kenzo:
    name: Cargo kenzo (${{ matrix.build_type }})
    runs-on: [self-hosted, Linux, X64]
    strategy:
      matrix:
        build_type: [debug, release]
      fail-fast: false
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.head_ref }}
          fetch-depth: 1

      - name: Install Nix
        uses: cachix/install-nix-action@v31.10.6

      - name: Cargo build
        env:
          RELEASE_FLAG: ${{ matrix.build_type == 'release' && '--release' || '' }}
        run: nix develop --command bash -c "rustup toolchain install stable --no-self-update && rustup default stable && cargo build --manifest-path tools/kenzo/Cargo.toml $RELEASE_FLAG"

  dotnet-editor:
    name: Dotnet editor (${{ matrix.build_type }})
    runs-on: [self-hosted, Linux, X64]
    strategy:
      matrix:
        build_type: [Debug, Release]
      fail-fast: false
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.head_ref }}
          fetch-depth: 1

      - name: Install Nix
        uses: cachix/install-nix-action@v31.10.6

      - name: Dotnet build
        run: nix develop --command bash -c 'dotnet build editor/editor.csproj --configuration ${{ matrix.build_type }}'

  dotnet-player:
    name: Dotnet player (${{ matrix.build_type }})
    runs-on: [self-hosted, Linux, X64]
    strategy:
      matrix:
        build_type: [Debug, Release]
      fail-fast: false
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.head_ref }}
          fetch-depth: 1

      - name: Install Nix
        uses: cachix/install-nix-action@v31.10.6

      - name: Dotnet build
        run: nix develop --command bash -c 'dotnet build tools/player/player.csproj --configuration ${{ matrix.build_type }}'
