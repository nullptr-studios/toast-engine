        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.head_ref }}
          fetch-depth: 1

      - name: Install Nix
        uses: cachix/install-nix-action@v31.10.6

      - name: Install Rust stable
        run: rustup toolchain install stable --no-self-update && rustup default stable

      - name: Cargo build
        run: cargo build --manifest-path tools/log_server/Cargo.toml --release

  cargo-reflection-generator-debug:
