        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.head_ref }}
          fetch-depth: 1

      - name: Install Nix
        uses: cachix/install-nix-action@v31.10.6

      - name: Install Rust stable
        run: rustup toolchain install stable --no-self-update && rustup default stable

      - name: Cargo build
        run: cargo build --manifest-path tools/reflection_generator/Cargo.toml --release

  cargo-kenzo-debug:
    name: Cargo kenzo (Debug)
    runs-on: [self-hosted, Linux, X64]
    defaults:
      run:
        shell: nix develop --command bash -e {0}
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
