name: release-on-merge

on:
  pull_request:
    branches:
      - main
    types:
      - closed

permissions:
  contents: write

jobs:
  release:
    name: tag and release
    runs-on: [self-hosted, linux]
    if: github.event.pull_request.merged == true && github.event.pull_request.base.repo.fork == false && github.event.pull_request.base.repo.full_name == github.repository
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: true

      - name: Determine next tag
        id: version
        shell: bash
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
        run: |
          set -euo pipefail

          latest_tag="$(git tag --list "2.*.*" --sort=-version:refname | head -n 1 || true)"
          if [[ -z "${latest_tag}" ]]; then
            if [[ "${HEAD_REF}" == "dev" ]]; then
              new_tag="2.0.0"
            else
              echo "No existing 2.*.* tags and merge is not dev -> main. Skipping."
              echo "create_release=false" >> "${GITHUB_OUTPUT}"
              exit 0
            fi
          else
            IFS='.' read -r major minor patch <<< "${latest_tag}"
            if [[ "${HEAD_REF}" == "dev" ]]; then
              minor=$((minor + 1))
              patch=0
            elif [[ "${HEAD_REF}" == hotfix/* ]]; then
              patch=$((patch + 1))
            else
              echo "Head ref '${HEAD_REF}' does not match dev or hotfix/*; skipping."
              echo "create_release=false" >> "${GITHUB_OUTPUT}"
              exit 0
            fi
            new_tag="${major}.${minor}.${patch}"
          fi

          if git rev-parse -q --verify "refs/tags/${new_tag}" > /dev/null; then
            echo "Tag ${new_tag} already exists; skipping."
            echo "create_release=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "new_tag=${new_tag}" >> "${GITHUB_OUTPUT}"
          echo "merge_sha=${MERGE_SHA}" >> "${GITHUB_OUTPUT}"
          echo "create_release=true" >> "${GITHUB_OUTPUT}"

      - name: Create tag
        if: steps.version.outputs.create_release == 'true'
        run: |
          git tag "${{ steps.version.outputs.new_tag }}" "${{ steps.version.outputs.merge_sha }}"
          git push origin "refs/tags/${{ steps.version.outputs.new_tag }}"

      - name: Create GitHub release
        if: steps.version.outputs.create_release == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const tag = "${{ steps.version.outputs.new_tag }}";
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Toast Engine v${tag}`,
              body: ""
            });
