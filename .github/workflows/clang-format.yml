name: ci-clang-format

on:
  pull_request:
    branches:
      - dev
      - main
    types:
      - opened
      - reopened
      - synchronize
      - edited

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-clang-format-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  format:
    name: clang-format
    runs-on: [self-hosted, Linux, X64]
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.head_ref }}
          fetch-depth: 1

      - name: Install Nix
        uses: cachix/install-nix-action@v31.10.6

      - name: Run clang-format on engine/src and engine/ffi
        run: |
          nix develop --command bash -c '
          mapfile -t files < <(find engine/src engine/ffi -type f \( -name "*.cpp" -o -name "*.hpp" -o -name "*.h" -o -name "*.inl" \) -print | sort)
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "No engine files matched formatting filters."
            exit 0
          fi
          printf "%s\0" "${files[@]}" | xargs -0 -n 1 -P "$(nproc)" clang-format -i --style=file:.clang-format
          if git diff --quiet -- "${files[@]}"; then
            echo "Formatting check passed."
            exit 0
          fi
          echo "::error::Formatting changes detected. Run clang-format locally and push the results."
          exit 1
          '
