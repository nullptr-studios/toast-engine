name: clang-format

on:
  pull_request:
    branches:
      - dev
      - main
    types:
      - opened
      - reopened
      - synchronize
      - edited

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: clang-format-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  format:
    name: clang-format
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          persist-credentials: true

      - name: Install Nix
        uses: cachix/install-nix-action@v30

      - name: Run clang-format
        run: |
          eval "$(nix --extra-experimental-features 'nix-command flakes' print-dev-env .)"
          bash ./tools/ci/clang_format.sh
