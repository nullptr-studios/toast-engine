name: ci-clang-tidy

on:
  pull_request:
    branches:
      - dev
      - main
    types:
      - opened
      - reopened
      - synchronize
      - edited

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-clang-tidy-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  tidy:
    name: clang-tidy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Install Nix
        uses: cachix/install-nix-action@v30

      - name: Setup vcpkg
        id: vcpkg
        uses: ./.github/actions/setup-vcpkg

      - name: Generate compile_commands
        run: |
          eval "$(nix --extra-experimental-features 'nix-command flakes' print-dev-env .)"
          cmake -B build/clang-tidy -DCMAKE_EXPORT_COMPILE_COMMANDS=ON -DCMAKE_BUILD_TYPE=Debug -DCMAKE_TOOLCHAIN_FILE="${{ steps.vcpkg.outputs.toolchain-file }}"
          cp build/clang-tidy/compile_commands.json .

      - name: Run clang-tidy on engine/src
        run: |
          eval "$(nix --extra-experimental-features 'nix-command flakes' print-dev-env .)"
          bash ./tools/ci/clang_tidy.sh
