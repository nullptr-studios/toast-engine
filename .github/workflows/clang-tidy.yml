name: clang-tidy

on:
  pull_request:
    branches:
      - dev
      - main
    types:
      - opened
      - reopened
      - synchronize
      - edited

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: clang-tidy-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  tidy:
    name: clang-tidy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Install Nix
        uses: cachix/install-nix-action@v30

      - name: Generate compile_commands
        run: |
          eval "$(nix --extra-experimental-features 'nix-command flakes' print-dev-env .)"
          xmake project -k compile_commands -y

      - name: Run clang-tidy
        run: |
          eval "$(nix --extra-experimental-features 'nix-command flakes' print-dev-env .)"
          bash ./tools/ci/clang_tidy.sh
