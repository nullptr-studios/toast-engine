name: draft-dev-to-main

on:
  pull_request:
    branches:
      - dev
    types:
      - closed

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  draft:
    name: create dev -> main draft
    runs-on: [self-hosted, linux]
    if: github.event.pull_request.merged == true && github.event.pull_request.base.repo.fork == false && github.event.pull_request.base.repo.full_name == github.repository
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Fetch main and dev
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main dev --prune --tags

      - name: Determine next tag
        id: version
        shell: bash
        run: |
          set -euo pipefail

          ahead_count="$(git rev-list --count origin/main..origin/dev)"
          if [[ "${ahead_count}" -le 0 ]]; then
            echo "dev is not ahead of main; skipping."
            echo "create_pr=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          latest_tag="$(git tag --list "2.*.*" --sort=-version:refname | head -n 1 || true)"
          if [[ -z "${latest_tag}" ]]; then
            new_tag="2.0.0"
          else
            IFS='.' read -r major minor patch <<< "${latest_tag}"
            minor=$((minor + 1))
            patch=0
            new_tag="${major}.${minor}.${patch}"
          fi

          echo "new_tag=${new_tag}" >> "${GITHUB_OUTPUT}"
          echo "create_pr=true" >> "${GITHUB_OUTPUT}"

      - name: Create draft PR if missing
        if: steps.version.outputs.create_pr == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tag = "${{ steps.version.outputs.new_tag }}";

            const existing = await github.rest.pulls.list({
              owner,
              repo,
              state: "open",
              base: "main",
              head: `${owner}:dev`
            });

            if (existing.data.length > 0) {
              core.info("Open dev -> main PR already exists; skipping.");
              return;
            }

            const pr = await github.rest.pulls.create({
              owner,
              repo,
              title: `Toast Engine v${tag}`,
              head: "dev",
              base: "main",
              body: "",
              draft: true
            });

            await github.rest.pulls.requestReviewers({
              owner,
              repo,
              pull_number: pr.data.number,
              reviewers: ["ynks"]
            });

            await github.rest.issues.addAssignees({
              owner,
              repo,
              issue_number: pr.data.number,
              assignees: ["ynks"]
            });
