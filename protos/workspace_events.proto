syntax = "proto3";
package proto.events;

message HierarchyElement {
  string uid = 1;
  string name = 2;
  string type = 3;
  bool enabled = 4;
  repeated HierarchyElement children = 5;
  bool is_prefab = 6;
}

message UpdateHierarchyData {
  HierarchyElement root = 1;
  bool is_empty = 2;
}

message RequestHierarchyUpdate {}

message ReloadAssetsManifest {}

message WorkspaceCreate {
  string parent = 1;
  string type = 2;
}

message WorkspaceSpawn {
  string parent = 1;
  bool is_uri = 2;
  string uid = 3;
  string uri = 4;
}

message WorkspaceRemove {
  string target = 1;
}

message WorkspaceDestroy {
  uint64 handle = 1;
}

message SetActiveWorkspace {
  uint64 handle = 1;
}

message WorkspaceSave {
  string target = 1;
  string path = 2;
}

message WorkspaceAutosave {
  uint64 handle = 1;
  string path = 2;
}

message WorkspaceCreateNode {
  string parent = 1;
  string type = 2;
}

message WorkspaceRemoveNode {
  string target = 1;
}

message WorkspaceMoveNodeTo {
  string target = 1;
  string new_parent = 2;
  string predecessor = 3;
}

message SetFocusedNode {
  string node = 1;
}

message NodeChangeParam {
  string parameter = 1;
  string value = 2;
}

message NodeChangeName {
  string node = 1;
  string name = 2;
}

message NodeCallFunction {
  string function = 1;
}

message NodeEnabled {
  string node = 2;
  bool enabled = 3;
}

message NodeChangeType {
  string node = 1;
  string type = 2;
}

message WorkspaceDuplicateNode {
  string source = 1;
  string parent = 2;
}

message WorkspaceCopyNode {
  string source = 1;
}

message WorkspacePasteNode {
  string parent = 1;
}

message WorkspacePromoteNode {
  string target = 1;
  string path = 2;
}

message WorkspacePause {
  uint64 handle = 1;
  bool paused = 2;
}

// 0 Select, 1 Translate, 2 Rotate, 3 Scale, 4 Ruler
message SetGizmoTool {
  uint32 tool = 1;
}

message SetCoordinateSpace {
  bool world = 1;
}

// kind: 0 translate, 1 rotate, 2 scale
message SetSnapping {
  uint32 kind = 1;
  bool enabled = 2;
  float value = 3;
}

message SetCameraMode {
  bool game = 1;
}

message InspectorField {
  string name = 1;
  string value = 2;
}

message InspectorContent {
  string name = 1;
  bool enabled = 2;
  repeated InspectorField parameters = 3;
  string uid = 4;
}

message LuaField {
  string path = 1;
  string name = 2;
  uint32 kind = 3;
  bool is_array = 4;
  string ref_type = 5;
  string value = 6;
  string default_value = 7;
}

message LuaSubgroup {
  string name = 1;
  repeated LuaField fields = 2;
}

message LuaGroup {
  string name = 1;
  repeated LuaField fields = 2;
  repeated LuaSubgroup subgroups = 3;
}

message LuaScriptCard {
  string script = 1;
  repeated LuaField fields = 2;
  repeated LuaGroup groups = 3;
}

message InspectorLuaContent {
  string uid = 1;
  uint32 schema_version = 2;
  repeated LuaScriptCard scripts = 3;
}

message NodeChangeLuaParam {
  string path = 1;
  string value = 2;
}
